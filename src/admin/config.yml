# Auto-generated by scripts/generate-cms-config.js
# Do not edit manually — changes will be overwritten.
# To update, edit src/_data/profiles.js and re-run this script.

# Backend configuration
backend:
  name: git-gateway
  branch: main

# Local backend for development
# To use: run "npm run admin" in a separate terminal
local_backend: true

# Media and public folders
media_folder: "src/images"
public_folder: "/images"

# Collections
collections:
  # ============================================
  # BLOG POSTS
  # ============================================
  - name: "blog-rodthunderen"
    label: "Rod Thunderen - Blog Posts"
    label_singular: "Rod Thunderen Blog Post"
    folder: "src/blogs/rodthunderen"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    editor:
      preview: true
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/post.njk"}
      - {label: "Author", name: "author", widget: "hidden", default: "Rod Thunderen"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text", hint: "Brief description for SEO and previews"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Tags", name: "tags", widget: "hidden", default: "post"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "blog-janedoe"
    label: "Jane Doe - Blog Posts"
    label_singular: "Jane Doe Blog Post"
    folder: "src/blogs/janedoe"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    editor:
      preview: true
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/post.njk"}
      - {label: "Author", name: "author", widget: "hidden", default: "Jane Doe"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text", hint: "Brief description for SEO and previews"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Tags", name: "tags", widget: "hidden", default: "post"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "blog-johnsmith"
    label: "John Smith - Blog Posts"
