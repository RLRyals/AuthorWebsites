  # ============================================
  # SITE PAGES
  # ============================================
  - name: "pages"
    label: "Site Pages"
    description: "Edit main site pages (shared across all pen names)"
    files:
      - name: "newsletter"
        label: "Newsletter Page"
        file: "src/newsletter.md"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "layouts/base.njk"}
