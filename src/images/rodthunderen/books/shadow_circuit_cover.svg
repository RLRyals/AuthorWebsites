<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="bg2" x1="0.7" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0b0e14"/>
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="rgba(61,216,197,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="600" fill="url(#bg2)"/>
  <rect width="400" height="600" fill="url(#glow2)"/>
  <!-- Subtle border -->
  <rect x="12" y="12" width="376" height="576" rx="4" fill="none" stroke="rgba(123,94,167,0.12)" stroke-width="1"/>
  <!-- Series label -->
  <text x="200" y="80" text-anchor="middle" fill="rgba(61,216,197,0.6)" font-family="Georgia, serif" font-size="11" letter-spacing="5">NEON RITES</text>
  <!-- Title -->
  <text x="200" y="150" text-anchor="middle" fill="#eef0f6" font-family="Georgia, serif" font-size="42" font-weight="bold" letter-spacing="3">SHADOW</text>
  <text x="200" y="200" text-anchor="middle" fill="#eef0f6" font-family="Georgia, serif" font-size="42" font-weight="bold" letter-spacing="3">CIRCUIT</text>
  <!-- Tagline -->
  <text x="200" y="240" text-anchor="middle" fill="rgba(184,188,200,0.5)" font-family="Georgia, serif" font-size="13" font-style="italic">The grid remembers what the city forgot.</text>
  <!-- Circuit pattern -->
  <g stroke="rgba(61,216,197,0.25)" stroke-width="1" fill="none">
    <line x1="140" y1="300" x2="200" y2="300"/>
    <line x1="200" y1="300" x2="200" y2="340"/>
    <line x1="200" y1="340" x2="260" y2="340"/>
    <line x1="260" y1="340" x2="260" y2="380"/>
    <line x1="140" y1="300" x2="140" y2="360"/>
    <line x1="140" y1="360" x2="200" y2="360"/>
    <line x1="200" y1="360" x2="200" y2="400"/>
    <circle cx="200" cy="300" r="3" fill="rgba(123,94,167,0.6)"/>
    <circle cx="260" cy="340" r="3" fill="rgba(61,216,197,0.6)"/>
    <circle cx="140" cy="300" r="3" fill="rgba(196,59,92,0.5)"/>
    <circle cx="200" cy="400" r="3" fill="rgba(123,94,167,0.6)"/>
    <circle cx="200" cy="340" r="4" fill="rgba(61,216,197,0.4)"/>
    <circle cx="140" cy="360" r="3" fill="rgba(61,216,197,0.4)"/>
    <circle cx="200" cy="360" r="3" fill="rgba(196,59,92,0.4)"/>
  </g>
  <!-- Rune circle around circuit -->
  <circle cx="200" cy="350" r="80" fill="none" stroke="rgba(123,94,167,0.15)" stroke-width="1" stroke-dasharray="4,8"/>
  <!-- Author -->
  <text x="200" y="480" text-anchor="middle" fill="rgba(167,139,219,0.8)" font-family="Georgia, serif" font-size="14" letter-spacing="4">ROD THUNDEREN</text>
  <!-- Book number -->
  <rect x="290" y="25" width="85" height="28" rx="3" fill="rgba(123,94,167,0.15)" stroke="rgba(123,94,167,0.3)" stroke-width="1"/>
  <text x="332" y="44" text-anchor="middle" fill="rgba(167,139,219,0.9)" font-family="Arial, sans-serif" font-size="10" letter-spacing="2">BOOK TWO</text>
</svg>