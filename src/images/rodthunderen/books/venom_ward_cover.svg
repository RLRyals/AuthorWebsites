<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="bg3" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#110d17"/>
      <stop offset="50%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0b0e14"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="rgba(196,59,92,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="600" fill="url(#bg3)"/>
  <rect width="400" height="600" fill="url(#glow3)"/>
  <!-- Subtle border -->
  <rect x="12" y="12" width="376" height="576" rx="4" fill="none" stroke="rgba(196,59,92,0.12)" stroke-width="1"/>
  <!-- Series label -->
  <text x="200" y="80" text-anchor="middle" fill="rgba(196,59,92,0.6)" font-family="Georgia, serif" font-size="11" letter-spacing="5">NEON RITES</text>
  <!-- Title -->
  <text x="200" y="150" text-anchor="middle" fill="#eef0f6" font-family="Georgia, serif" font-size="42" font-weight="bold" letter-spacing="3">VENOM</text>
  <text x="200" y="200" text-anchor="middle" fill="#eef0f6" font-family="Georgia, serif" font-size="42" font-weight="bold" letter-spacing="3">WARD</text>
  <!-- Tagline -->
  <text x="200" y="240" text-anchor="middle" fill="rgba(184,188,200,0.5)" font-family="Georgia, serif" font-size="13" font-style="italic">Every ward has a price. Every poison, a name.</text>
  <!-- Protective ward sigil -->
  <g transform="translate(200,350)">
    <!-- Outer ward ring -->
    <circle cx="0" cy="0" r="65" fill="none" stroke="rgba(196,59,92,0.3)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="58" fill="none" stroke="rgba(123,94,167,0.2)" stroke-width="1" stroke-dasharray="2,6"/>
    <!-- Inner triangle ward -->
    <polygon points="0,-45 39,22 -39,22" fill="none" stroke="rgba(61,216,197,0.3)" stroke-width="1.5" stroke-linejoin="round"/>
    <polygon points="0,45 -39,-22 39,-22" fill="none" stroke="rgba(196,59,92,0.25)" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Center eye -->
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="none" stroke="rgba(167,139,219,0.5)" stroke-width="1"/>
    <circle cx="0" cy="0" r="3" fill="rgba(196,59,92,0.4)"/>
  </g>
  <!-- Author -->
  <text x="200" y="480" text-anchor="middle" fill="rgba(196,59,92,0.7)" font-family="Georgia, serif" font-size="14" letter-spacing="4">ROD THUNDEREN</text>
  <!-- Book number -->
  <rect x="283" y="25" width="92" height="28" rx="3" fill="rgba(196,59,92,0.15)" stroke="rgba(196,59,92,0.3)" stroke-width="1"/>
  <text x="329" y="44" text-anchor="middle" fill="rgba(196,59,92,0.9)" font-family="Arial, sans-serif" font-size="10" letter-spacing="2">BOOK THREE</text>
</svg>