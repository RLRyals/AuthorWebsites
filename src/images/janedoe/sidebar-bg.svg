  <rect x="52" y="280" width="14" height="40" rx="2" fill="#8b4513" opacity="0.5"/>
  <rect x="70" y="275" width="20" height="45" rx="2" fill="#d4956a" opacity="0.5"/>
  <rect x="94" y="282" width="12" height="38" rx="2" fill="#6b8e23" opacity="0.4"/>
  <rect x="110" y="272" width="16" height="48" rx="2" fill="#c2724e" opacity="0.5"/>
  <rect x="130" y="278" width="22" height="42" rx="2" fill="#8b6914" opacity="0.45"/>
  <rect x="156" y="274" width="14" height="46" rx="2" fill="#b22222" opacity="0.4"/>
  <rect x="174" y="285" width="18" height="35" rx="2" fill="#d4956a" opacity="0.5"/>
  <rect x="196" y="270" width="15" height="50" rx="2" fill="#556b2f" opacity="0.4"/>
  <rect x="215" y="280" width="20" height="40" rx="2" fill="#8b4513" opacity="0.45"/>

